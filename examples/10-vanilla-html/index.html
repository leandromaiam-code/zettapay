<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="zettapay-merchant-id" content="merch_replace_me" />
    <title>Pay with USDC · ZettaPay</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0a1612;
        color: #f5e6c8;
      }
      .card {
        background: rgba(245, 230, 200, 0.04);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(212, 169, 97, 0.2);
        border-radius: 16px;
        padding: 48px;
        max-width: 480px;
        text-align: center;
      }
      h1 { font-family: "Cormorant Garamond", Georgia, serif; font-weight: 400; margin: 0 0 8px; }
      p { opacity: 0.7; margin: 0 0 24px; }
      zetta-checkout::part(button) {
        background: #d4a961;
        color: #0a1612;
        font-weight: 600;
        padding: 14px 28px;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>One Cool Thing</h1>
      <p>Drop-in USDC checkout · settlement in seconds.</p>
      <zetta-checkout
        data-merchant-id="merch_replace_me"
        data-amount="12.00"
        data-currency="USD"
        data-reference="landing-hero"
      ></zetta-checkout>
    </div>
    <script>
      const merchantId = document
        .querySelector('meta[name="zettapay-merchant-id"]')
        ?.getAttribute("content");
      if (merchantId) {
        document
          .querySelector("zetta-checkout")
          ?.setAttribute("data-merchant-id", merchantId);
      }
      document.addEventListener("zettapay:settled", function (e) {
        console.log("paid:", e.detail);
      });
    </script>
    <script src="https://cdn.zettapay.dev/embed.js" defer></script>
  </body>
</html>
