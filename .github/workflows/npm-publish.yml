name: npm-publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip actual npm publish)'
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - name: '@zettapay/sdk'
            path: packages/sdk
          - name: '@zettapay/widget'
            path: packages/widget
          - name: '@zettapay/embed'
            path: packages/embed
          - name: '@zettapay/listener'
            path: packages/listener
          - name: '@zettapay/receiver'
            path: packages/receiver
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          always-auth: true

      - name: Install workspace dependencies
        run: npm ci --include=dev

      - name: Build ${{ matrix.package.name }}
        run: npm run build --workspace ${{ matrix.package.name }}

      - name: Gate publish on tag matching package version
        id: gate
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: ${{ matrix.package.path }}
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          pkg=$(node -p "require('./package.json').version")
          if [ "$tag" = "$pkg" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "::notice::tag v$tag matches ${{ matrix.package.name }}@$pkg — will publish"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "::notice::tag v$tag does not match ${{ matrix.package.name }}@$pkg — skipping publish"
          fi

      - name: Check NPM_TOKEN presence
        id: token
        if: ${{ !inputs.dry_run && (steps.gate.outputs.publish == 'true' || github.event_name == 'workflow_dispatch') }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "::warning::NPM_TOKEN secret is missing — falling back to dry-run pack"
          else
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish ${{ matrix.package.name }}
        if: ${{ !inputs.dry_run && steps.gate.outputs.publish == 'true' && steps.token.outputs.has_token == 'true' }}
        working-directory: ${{ matrix.package.path }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

      - name: Dry-run pack (no token, dry_run input, or tag-version mismatch)
        if: ${{ inputs.dry_run || steps.token.outputs.has_token == 'false' || steps.gate.outputs.publish != 'true' }}
        working-directory: ${{ matrix.package.path }}
        run: npm pack --dry-run
