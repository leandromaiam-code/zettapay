name: npm-publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip actual npm publish)'
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - name: '@zettapay/sdk'
            path: packages/sdk
          - name: '@zettapay/widget'
            path: packages/widget
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          always-auth: true

      - name: Install workspace dependencies
        run: npm ci --include=dev

      - name: Build ${{ matrix.package.name }}
        run: npm run build --workspace ${{ matrix.package.name }}

      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: ${{ matrix.package.path }}
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          pkg=$(node -p "require('./package.json').version")
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag does not match ${{ matrix.package.name }} version $pkg"
            exit 1
          fi

      - name: Publish ${{ matrix.package.name }}
        if: ${{ !inputs.dry_run }}
        working-directory: ${{ matrix.package.path }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

      - name: Dry-run pack
        if: ${{ inputs.dry_run }}
        working-directory: ${{ matrix.package.path }}
        run: npm pack --dry-run
