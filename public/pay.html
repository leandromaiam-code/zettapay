<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pagar com USDC — ZettaPay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root { color-scheme: dark; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  color: #fff;
  font-family: 'Inter', system-ui, sans-serif;
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 20px;
  background-image:
    radial-gradient(circle at 20% 0%, rgba(79,107,255,0.18), transparent 50%),
    radial-gradient(circle at 80% 100%, rgba(79,107,255,0.12), transparent 50%);
}
.card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 24px;
  padding: 40px 32px;
  max-width: 440px;
  width: 100%;
  backdrop-filter: blur(20px);
  box-shadow: 0 24px 80px rgba(0,0,0,0.4);
}
.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 32px;
}
.logo {
  width: 36px; height: 36px;
  background: #4F6BFF;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 18px;
}
.brand-name { font-weight: 700; font-size: 18px; }
.label { font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; color: #888; margin-bottom: 6px; }
.amount { font-size: 56px; font-weight: 800; line-height: 1; margin-bottom: 6px; }
.amount-suffix { font-size: 18px; color: #888; font-weight: 500; }
.row { display: flex; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 14px; }
.row:last-of-type { border-bottom: none; }
.row .k { color: #888; }
.row .v { color: #fff; font-weight: 500; font-family: ui-monospace, monospace; }
.btn {
  width: 100%;
  margin-top: 28px;
  padding: 16px;
  border-radius: 12px;
  background: linear-gradient(135deg, #4F6BFF, #6B85FF);
  color: #fff;
  border: none;
  font-weight: 700;
  font-size: 15px;
  font-family: inherit;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: all 0.2s;
  box-shadow: 0 8px 24px rgba(79,107,255,0.35);
}
.btn:hover { transform: translateY(-1px); box-shadow: 0 12px 32px rgba(79,107,255,0.45); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.status { margin-top: 16px; padding: 12px 14px; border-radius: 10px; font-size: 13px; font-family: ui-monospace, monospace; display: none; word-break: break-all; }
.status.show { display: block; }
.status.info { background: rgba(79,107,255,0.12); color: #aab6ff; }
.status.success { background: rgba(20,241,149,0.12); color: #14F195; }
.status.error { background: rgba(244,67,54,0.12); color: #ff7c7c; }
.status a { color: inherit; text-decoration: underline; }
.foot { text-align: center; margin-top: 22px; font-size: 11px; color: #555; }
.foot a { color: #4F6BFF; text-decoration: none; }
.error-card { text-align: center; padding: 60px 20px; }
.error-card h2 { margin-bottom: 12px; }
.error-card p { color: #888; }
</style>
</head>
<body>
<div class="card">
<div id="loading" class="error-card">
<p>Carregando...</p>
</div>
<div id="checkout" style="display:none">
<div class="brand">
<div class="logo">Z</div>
<div class="brand-name">ZettaPay</div>
</div>
<div class="label" id="label-text">Pagamento</div>
<div class="amount"><span id="amount">0</span> <span class="amount-suffix">USDC</span></div>
<div style="margin: 28px 0 8px;">
<div class="row"><span class="k">Para</span><span class="v" id="merchant-display">—</span></div>
<div class="row"><span class="k">Rede</span><span class="v">Solana Devnet</span></div>
<div class="row"><span class="k">Taxa</span><span class="v" id="fee">— USDC</span></div>
<div class="row"><span class="k">Settlement</span><span class="v" style="color:#14F195">~2s</span></div>
</div>
<button id="payBtn" class="btn">⚡ Conectar Phantom &amp; Pagar</button>
<div id="status" class="status"></div>
<div class="foot">Powered by <a href="/">ZettaPay</a> · 0,30% fee</div>
</div>
<div id="error-state" class="error-card" style="display:none">
<h2>Pagamento inválido</h2>
<p id="error-msg">Faltam parâmetros: merchant + amount</p>
<a href="/" class="btn" style="margin-top:24px;text-decoration:none">Voltar pra home</a>
</div>
</div>
<script type="module">
import {
  Connection,
  PublicKey,
  Transaction,
} from 'https://esm.sh/@solana/web3.js@1.95.8';
import {
  getAssociatedTokenAddressSync,
  createTransferCheckedInstruction,
  createAssociatedTokenAccountInstruction,
  TOKEN_PROGRAM_ID,
  ASSOCIATED_TOKEN_PROGRAM_ID,
} from 'https://esm.sh/@solana/spl-token@0.4.9?deps=@solana/web3.js@1.95.8';

const USDC_MINT = new PublicKey('4zMMC9srt5Ri5X14GAgXhaHii3GnPAEERYPJgZJDncDU');
const USDC_DECIMALS = 6;
const SOLANA_ADDRESS_RE = /^[1-9A-HJ-NP-Za-km-z]{32,44}$/;

const qs = new URLSearchParams(location.search);
const merchantRef = qs.get('merchant') || '';
const amount = parseFloat(qs.get('amount') || '0');
const label = qs.get('label') || 'Pagamento';
const returnUrl = qs.get('return_url') || '';
const rpcOverride = qs.get('rpc') || '';

if (!merchantRef || !amount || amount <= 0) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error-state').style.display = 'block';
} else {
  bootCheckout();
}

function bootCheckout() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('checkout').style.display = 'block';
  document.getElementById('label-text').textContent = label;
  document.getElementById('amount').textContent = amount.toFixed(2);
  document.getElementById('merchant-display').textContent =
    merchantRef.length > 20 ? merchantRef.slice(0, 8) + '…' + merchantRef.slice(-6) : merchantRef;
  document.getElementById('fee').textContent = (amount * 0.003).toFixed(3) + ' USDC';
  document.getElementById('payBtn').addEventListener('click', handlePay);
}

function setStatus(msg, kind) {
  const s = document.getElementById('status');
  s.className = 'status show ' + (kind || 'info');
  if (typeof msg === 'string') s.textContent = msg;
  else { s.textContent = ''; s.appendChild(msg); }
}

function explorerLink(signature) {
  const a = document.createElement('a');
  a.href = 'https://explorer.solana.com/tx/' + signature + '?cluster=devnet';
  a.target = '_blank';
  a.rel = 'noopener';
  a.textContent = signature.slice(0, 12) + '…' + signature.slice(-8);
  return a;
}

function isMobile() {
  return /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
}

function getPhantom() {
  const p = (window.phantom && window.phantom.solana) || window.solana;
  return (p && p.isPhantom) ? p : null;
}

async function resolveMerchantWallet(ref) {
  if (SOLANA_ADDRESS_RE.test(ref)) return new PublicKey(ref);
  const r = await fetch('/api/simulate/' + encodeURIComponent(ref) + '?amount=' + amount);
  if (!r.ok) throw new Error('Merchant lookup failed (' + r.status + ')');
  const data = await r.json();
  const wallet = data && data.merchant && data.merchant.walletAddress;
  if (!wallet || !SOLANA_ADDRESS_RE.test(wallet)) throw new Error('Merchant has no wallet on file');
  return new PublicKey(wallet);
}

function classifyError(err) {
  const msg = (err && err.message) ? String(err.message) : String(err || '');
  const code = err && (err.code || err.error?.code);
  if (code === 4001 || /user reject|rejected|denied|cancel/i.test(msg)) {
    return 'Pagamento cancelado na carteira.';
  }
  if (/insufficient.*fund|0x1|TokenAccountInsufficientFunds|custom program error: 0x1/i.test(msg)) {
    return 'Saldo USDC insuficiente. Use /faucet pra receber USDC devnet.';
  }
  if (/blockhash|expired/i.test(msg)) {
    return 'Blockhash expirou. Tente novamente.';
  }
  if (/timeout|timed out/i.test(msg)) {
    return 'RPC timeout. Tente novamente em alguns segundos.';
  }
  if (/fetch|network/i.test(msg)) {
    return 'Erro de rede. Verifique sua conexão.';
  }
  return msg || 'Falha ao processar pagamento.';
}

async function handlePay() {
  const btn = document.getElementById('payBtn');
  const provider = getPhantom();

  if (!provider && isMobile()) {
    setStatus('Abrindo Phantom...', 'info');
    const ref = encodeURIComponent(location.origin);
    location.href = 'https://phantom.app/ul/browse/' + encodeURIComponent(location.href) + '?ref=' + ref;
    return;
  }
  if (!provider) {
    setStatus('Phantom não detectado. Instale em phantom.app', 'error');
    window.open('https://phantom.app/download', '_blank');
    return;
  }

  btn.disabled = true;

  try {
    setStatus('Conectando Phantom...', 'info');
    const resp = await provider.connect();
    const payerPubkey = new PublicKey(resp.publicKey.toString());

    setStatus('Buscando merchant...', 'info');
    const merchantWallet = await resolveMerchantWallet(merchantRef);

    setStatus('Montando transação...', 'info');
    const rpcUrl = rpcOverride || 'https://api.devnet.solana.com';
    const connection = new Connection(rpcUrl, 'confirmed');

    const payerAta = getAssociatedTokenAddressSync(USDC_MINT, payerPubkey, false);
    const merchantAta = getAssociatedTokenAddressSync(USDC_MINT, merchantWallet, false);

    const [payerInfo, merchantInfo, latest] = await Promise.all([
      connection.getAccountInfo(payerAta),
      connection.getAccountInfo(merchantAta),
      connection.getLatestBlockhash('confirmed'),
    ]);

    const tx = new Transaction({
      feePayer: payerPubkey,
      recentBlockhash: latest.blockhash,
    });

    if (!payerInfo) {
      tx.add(createAssociatedTokenAccountInstruction(
        payerPubkey, payerAta, payerPubkey, USDC_MINT,
        TOKEN_PROGRAM_ID, ASSOCIATED_TOKEN_PROGRAM_ID,
      ));
    }
    if (!merchantInfo) {
      tx.add(createAssociatedTokenAccountInstruction(
        payerPubkey, merchantAta, merchantWallet, USDC_MINT,
        TOKEN_PROGRAM_ID, ASSOCIATED_TOKEN_PROGRAM_ID,
      ));
    }

    const microAmount = BigInt(Math.round(amount * Math.pow(10, USDC_DECIMALS)));
    tx.add(createTransferCheckedInstruction(
      payerAta, USDC_MINT, merchantAta, payerPubkey,
      microAmount, USDC_DECIMALS, [], TOKEN_PROGRAM_ID,
    ));

    setStatus('Confirme no Phantom...', 'info');
    const { signature } = await provider.signAndSendTransaction(tx);

    setStatus('Enviando à rede...', 'info');
    const confirmation = await connection.confirmTransaction({
      signature,
      blockhash: latest.blockhash,
      lastValidBlockHeight: latest.lastValidBlockHeight,
    }, 'confirmed');

    if (confirmation.value && confirmation.value.err) {
      throw new Error('Transação rejeitada on-chain: ' + JSON.stringify(confirmation.value.err));
    }

    const wrap = document.createElement('span');
    wrap.appendChild(document.createTextNode('✓ Pago! Tx: '));
    wrap.appendChild(explorerLink(signature));
    setStatus(wrap, 'success');

    if (returnUrl) {
      setTimeout(function () {
        const sep = returnUrl.includes('?') ? '&' : '?';
        location.href = returnUrl + sep + 'tx=' + encodeURIComponent(signature);
      }, 3000);
    }
  } catch (err) {
    setStatus(classifyError(err), 'error');
    btn.disabled = false;
  }
}
</script>
</body>
</html>
