<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ZettaPay</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0a1612;
        color: #f5e6c8;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      .card {
        max-width: 560px;
        padding: 2.5rem;
        text-align: center;
      }
      h1 {
        font-family: "Cormorant Garamond", "Times New Roman", serif;
        font-weight: 500;
        font-size: clamp(2.25rem, 4vw, 3.25rem);
        letter-spacing: 0.02em;
        color: #d4a961;
        margin: 0 0 0.75rem;
      }
      p { line-height: 1.6; margin: 0 0 1.25rem; opacity: 0.85; }
      code {
        display: inline-block;
        padding: 0.15rem 0.55rem;
        border: 1px solid #d4a96155;
        border-radius: 4px;
        font-family: ui-monospace, "JetBrains Mono", "SFMono-Regular", monospace;
        font-size: 0.9rem;
        color: #d4a961;
      }
      ul { list-style: none; padding: 0; margin: 1.5rem 0 0; display: grid; gap: 0.5rem; }
      a { color: #d4a961; text-decoration: none; border-bottom: 1px solid #d4a96155; }
      a:hover { border-bottom-color: #d4a961; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>ZettaPay</h1>
      <p>Universal Solana payment protocol for humans and AI agents.</p>
      <ul>
        <li><a href="/api">API metadata</a> — <code>/api</code></li>
        <li><a href="/healthz">Health check</a> — <code>/healthz</code></li>
        <li><a href="/simulate/test-merchant">Simulate (demo)</a> — <code>/simulate/:merchant</code></li>
      </ul>
    </main>
  </body>
</html>
