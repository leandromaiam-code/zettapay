services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: zettapay-api:local
    container_name: zettapay-api
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      HOST: 0.0.0.0
      SOLANA_NETWORK: ${SOLANA_NETWORK:-devnet}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      SOLANA_COMMITMENT: ${SOLANA_COMMITMENT:-confirmed}
      USDC_MINT_ADDRESS: ${USDC_MINT_ADDRESS:-4zMMC9srt5Ri5X14GAgXhaHii3GnPAEERYPJgZJDncDU}
      VERCEL_WEBHOOK_SECRET: ${VERCEL_WEBHOOK_SECRET:-}
      MOONPAY_WEBHOOK_SECRET: ${MOONPAY_WEBHOOK_SECRET:-}
      MERCHANT_WEBHOOK_URL: ${MERCHANT_WEBHOOK_URL:-}
      MERCHANT_WEBHOOK_SECRET: ${MERCHANT_WEBHOOK_SECRET:-}
    volumes:
      - zettapay-data:/app/data
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:'+(process.env.PORT||3001)+'/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  zettapay-data:
